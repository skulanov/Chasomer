<!DOCTYPE html>
<html lang="cu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Часомѣръ Московскій</title>
    <style>
        /* Подключаем шрифт из корня репозитория */
        @font-face {
            font-family: 'FedorovskUnicode';
            src: url('FedorovskUnicode.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle, #1a1610 0%, #050505 100%);
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        .clock-card {
            text-align: center;
            padding: 50px 70px;
            border: 1px solid #4a3c28;
            background: rgba(15, 15, 15, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 700px; /* Немного расширил из-за расстояния между буквами */
            border-radius: 2px;
        }

        .title {
            font-family: 'FedorovskUnicode', serif;
            font-size: 28px;
            color: #8a704a;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'FedorovskUnicode', serif;
            font-size: 100px;
            height: 160px; 
        }

        .segment {
            width: 200px; /* Ширина увеличена для свободного расположения букв */
            text-align: center;
            letter-spacing: 15px; /* Расстояние между буквами */
            padding-left: 15px;   /* Компенсация letter-spacing для центровки */
            position: relative;
        }

        .separator {
            width: 40px;
            text-align: center;
            color: #5c4b32;
            padding-bottom: 15px;
            font-size: 80px;
        }

        /* Настройка титло */
        .titlo-container {
            position: relative;
            display: inline-block;
        }

        .titlo-mark {
            position: absolute;
            left: 50%;
            /* Регулировка высоты титло: чем меньше минус, тем ниже оно сидит */
            transform: translateX(-50%) translateY(-8px); 
            font-size: 0.8em;
            color: #e2c08d;
            pointer-events: none;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #5c4b32;
            letter-spacing: 2px;
            font-family: Arial, sans-serif;
            opacity: 0.7;
        }

        .ornament {
            color: #5c4b32;
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="title">Часомѣръ</div>
        <div class="ornament">☩</div>
        
        <div class="clock-display">
            <div id="hours" class="segment"></div>
            <div class="separator">:</div>
            <div id="minutes" class="segment"></div>
            <div class="separator">:</div>
            <div id="seconds" class="segment"></div>
        </div>

        <div class="ornament">☩</div>
        <div class="footer">by Dima Skulanov 2026</div>
    </div>

    <script>
        const units = { 1: 'а', 2: 'в', 3: 'г', 4: 'д', 5: 'е', 6: 'ѕ', 7: 'з', 8: 'и', 9: 'ѳ' };
        const tens = { 10: 'і', 20: 'к', 30: 'л', 40: 'м', 50: 'н' };

        /**
         * Оборачивает букву в контейнер с титло
         */
        function withTitlo(char) {
            return `<span class="titlo-container">${char}<span class="titlo-mark">\u0483</span></span>`;
        }

        /**
         * Конвертация в славянскую цифирь с учетом новых правил верстки
         */
        function toSlavonic(num) {
            if (num === 0) return withTitlo('ѻ');
            
            let char1 = '';
            let char2 = '';
            
            if (num >= 11 && num <= 19) {
                char1 = units[num % 10];
                char2 = 'і';
            } else {
                const t = Math.floor(num / 10) * 10;
                const u = num % 10;
                if (t > 0) char1 = tens[t];
                if (u > 0) char2 = units[u];
            }

            // Логика постановки титло: 
            // Если буква одна - над ней.
            // Если две - по традиции над первой в паре (над десятком или над единицей в 11-19).
            if (char1 && char2) {
                return withTitlo(char1) + char2;
            } else {
                return withTitlo(char1 || char2);
            }
        }

        function updateClock() {
            try {
                const now = new Date();
                const options = { 
                    timeZone: 'Europe/Moscow', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit', 
                    hour12: false 
                };
                
                const parts = new Intl.DateTimeFormat('ru-RU', options).formatToParts(now);
                const h = parseInt(parts.find(p => p.type === 'hour').value);
                const m = parseInt(parts.find(p => p.type === 'minute').value);
                const s = parseInt(parts.find(p => p.type === 'second').value);

                document.getElementById('hours').innerHTML = toSlavonic(h);
                document.getElementById('minutes').innerHTML = toSlavonic(m);
                document.getElementById('seconds').innerHTML = toSlavonic(s);
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
