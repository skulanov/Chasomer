<!DOCTYPE html>
<html lang="cu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Часомѣръ Московскій</title>
    <style>
        /* Подключаем шрифт Fedorovsk */
        @font-face {
            font-family: 'Fedorovsk';
            src: url('FedorovskUnicode.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle, #1a1610 0%, #050505 100%);
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        .clock-card {
            text-align: center;
            padding: 50px 70px;
            border: 1px solid #4a3c28;
            background: rgba(15, 15, 15, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 650px; /* Фиксированная ширина рамки */
        }

        .title {
            font-family: 'Fedorovsk', serif;
            font-size: 28px;
            color: #8a704a;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fedorovsk', serif;
            font-size: 100px;
            height: 180px; /* Высота с запасом для высокого титло */
        }

        .segment {
            width: 170px; /* Фиксированная ширина для значений времени */
            text-align: center;
        }

        .separator {
            width: 40px;
            text-align: center;
            color: #5c4b32;
            padding-bottom: 20px; /* Визуальное выравнивание двоеточия */
        }

        /* Настройка высоты титло */
        .titlo {
            display: inline-block;
            transform: translateY(-18px); /* Поднимаем титло выше */
            width: 0;
            margin-left: -0.1em;
            pointer-events: none;
            color: #e2c08d;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #5c4b32;
            letter-spacing: 2px;
            font-family: Arial, sans-serif;
            opacity: 0.7;
        }

        .ornament {
            color: #5c4b32;
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="title">Часомѣръ Московскій</div>
        <div class="ornament">☩</div>
        
        <div class="clock-display">
            <div id="hours" class="segment"></div>
            <div class="separator">:</div>
            <div id="minutes" class="segment"></div>
            <div class="separator">:</div>
            <div id="seconds" class="segment"></div>
        </div>

        <div class="ornament">☩</div>
        <div class="footer">by Dima Skulanov 2026</div>
    </div>

    <script>
        const units = { 1: 'а', 2: 'в', 3: 'г', 4: 'д', 5: 'е', 6: 'ѕ', 7: 'з', 8: 'и', 9: 'ѳ' };
        const tens = { 10: 'і', 20: 'к', 30: 'л', 40: 'м', 50: 'н' };

        /**
         * Конвертация числа в церковнославянскую буквенную систему
         */
        function toSlavonic(num) {
            let res = '';
            const titloHtml = '<span class="titlo">\u0483</span>';
            
            if (num === 0) {
                res = 'ѻ'; // Используем "онъ" для нуля
            } else if (num >= 11 && num <= 19) {
                // Правило 11-19: единица на десять
                res = units[num % 10] + 'і';
            } else {
                const t = Math.floor(num / 10) * 10;
                const u = num % 10;
                if (t > 0) res += tens[t];
                if (u > 0) res += units[u];
            }

            // Логика постановки титло:
            // Если букв несколько, титло обычно ставится над второй с конца.
            if (res.length > 1) {
                return res.slice(0, -1) + titloHtml + res.slice(-1);
            } else {
                return res + titloHtml;
            }
        }

        function updateClock() {
            try {
                const now = new Date();
                const options = { 
                    timeZone: 'Europe/Moscow', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit', 
                    hour12: false 
                };
                
                const formatter = new Intl.DateTimeFormat('ru-RU', options);
                const parts = formatter.formatToParts(now);
                
                const h = parseInt(parts.find(p => p.type === 'hour').value);
                const m = parseInt(parts.find(p => p.type === 'minute').value);
                const s = parseInt(parts.find(p => p.type === 'second').value);

                // Обновляем каждый блок отдельно
                document.getElementById('hours').innerHTML = toSlavonic(h);
                document.getElementById('minutes').innerHTML = toSlavonic(m);
                document.getElementById('seconds').innerHTML = toSlavonic(s);
            } catch (e) {
                console.error("Ошибка обновления времени:", e);
            }
        }

        // Запуск интервала
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
