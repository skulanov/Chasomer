<!DOCTYPE html>
<html lang="cu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Часословъ Московскій</title>
    <style>
        /* Подключаем шрифт Fedorovsk */
        @font-face {
            font-family: 'Fedorovsk';
            src: url('https://cdn.jsdelivr.net/gh/slavonic/fedorovsk@master/Fedorovsk-Regular.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle, #1a1610 0%, #050505 100%);
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        .clock-card {
            text-align: center;
            padding: 50px 70px;
            border: 1px solid #4a3c28;
            background: rgba(15, 15, 15, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 2px;
            /* Фиксированная ширина всей карточки, чтобы она не расширялась */
            width: 650px; 
        }

        .title {
            font-family: 'Fedorovsk', serif;
            font-size: 24px;
            color: #8a704a;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Контейнер для цифр */
        .clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fedorovsk', serif;
            font-size: 100px;
            height: 140px; /* Фиксированная высота, чтобы титло не дергало блок */
        }

        /* Каждая группа (ЧЧ, ММ, СС) имеет строго фиксированную ширину */
        .segment {
            width: 170px; 
            text-align: center;
            display: inline-block;
            white-space: nowrap;
        }

        /* Разделитель (двоеточие) тоже в фиксированном блоке */
        .separator {
            width: 40px;
            text-align: center;
            color: #5c4b32;
            padding-bottom: 15px; /* Визуальная коррекция двоеточия */
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #5c4b32;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Декоративный элемент */
        .ornament {
            color: #5c4b32;
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="title">Часословъ Московскій</div>
        <div class="ornament">☩</div>
        
        <div class="clock-display">
            <div id="hours" class="segment"></div>
            <div class="separator">:</div>
            <div id="minutes" class="segment"></div>
            <div class="separator">:</div>
            <div id="seconds" class="segment"></div>
        </div>

        <div class="ornament">☩</div>
        <div class="footer">Москва • Третїй Римъ</div>
    </div>

    <script>
        const units = { 1: 'а', 2: 'в', 3: 'г', 4: 'д', 5: 'е', 6: 'ѕ', 7: 'з', 8: 'и', 9: 'ѳ' };
        const tens = { 10: 'і', 20: 'к', 30: 'л', 40: 'м', 50: 'н' };

        function toSlavonic(num) {
            let res = '';
            
            if (num === 0) {
                res = 'ѻ'; // Ноль как "онъ"
            } else if (num >= 11 && num <= 19) {
                // Правило 11-19: единица + і
                res = units[num % 10] + 'і';
            } else {
                const t = Math.floor(num / 10) * 10;
                const u = num % 10;
                if (t > 0) res += tens[t];
                if (u > 0) res += units[u];
            }

            // Титло (◌҃)
            // В церковнославянском титло ставится над единственной буквой 
            // или над второй с конца в многобуквенных числах.
            if (res.length > 1) {
                // Ставим титло над предпоследней буквой для красоты и читаемости
                return res.slice(0, -1) + '\u0483' + res.slice(-1);
            } else {
                return res + '\u0483';
            }
        }

        function updateClock() {
            const now = new Date();
            const options = { 
                timeZone: 'Europe/Moscow', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false 
            };
            
            const formatter = new Intl.DateTimeFormat('ru-RU', options);
            const parts = formatter.formatToParts(now);
            
            const h = parseInt(parts.find(p => p.type === 'hour').value);
            const m = parseInt(parts.find(p => p.type === 'minute').value);
            const s = parseInt(parts.find(p => p.type === 'second').value);

            // Обновляем каждый блок отдельно, чтобы избежать перерисовки всей строки
            document.getElementById('hours').textContent = toSlavonic(h);
            document.getElementById('minutes').textContent = toSlavonic(m);
            document.getElementById('seconds').textContent = toSlavonic(s);
        }

        // Плавный старт
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
