<!DOCTYPE html>
<html lang="cu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Часомѣ́ръ Московскій</title>
    <style>
        /* Подключаем шрифт Fedorovsk - стандарт печатной книги */
        @font-face {
            font-family: 'Fedorovsk';
            src: url('https://cdn.jsdelivr.net/gh/slavonic/fedorovsk@master/Fedorovsk-Regular.ttf') format('truetype');
            font-display: swap;
        }

        body {
            background-color: #0f0f0f;
            background-image: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            color: #e2c08d; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Times New Roman', serif;
        }

        .clock-card {
            text-align: center;
            padding: 60px;
            border: 1px solid rgba(226, 192, 141, 0.3);
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(226, 192, 141, 0.05);
            border-radius: 4px;
            position: relative;
        }

        /* Декоративные уголки */
        .clock-card::before, .clock-card::after {
            content: "♰";
            position: absolute;
            font-size: 20px;
            opacity: 0.5;
        }
        .clock-card::before { top: 10px; left: 10px; }
        .clock-card::after { bottom: 10px; right: 10px; }

        #clock {
            font-family: 'Fedorovsk', serif;
            font-size: 210px; /* Увеличили для солидности */
            line-height: 1.2;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(226, 192, 141, 0.2);
            letter-spacing: 5px;
        }

        .title {
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #b38b59;
            margin-bottom: 10px;
            border-bottom: 1px solid #b38b59;
            display: inline-block;
            padding-bottom: 5px;
        }

        .footer {
            font-size: 16px;
            color: #7a6348;
            margin-top: 20px;
            font-style: italic;
        }

        /* Разделитель (двоеточие) сделаем чуть меньше */
        .sep {
            font-size: 0.7em;
            vertical-align: middle;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="clock-card">
        <div class="title">Часомѣ́ръ Московскій</div>
        <div id="clock">...</div>
        <div class="footer">by Dima Skulanov 2026</div>
    </div>

    <script>
        const units = { 1: 'а', 2: 'в', 3: 'г', 4: 'д', 5: 'е', 6: 'ѕ', 7: 'з', 8: 'и', 9: 'ѳ' };
        const tens = { 10: 'і', 20: 'к', 30: 'л', 40: 'м', 50: 'н' };

        function toSlavonic(num) {
            if (num === 0) return 'ѻ'; // Для нуля используем "онъ"
            let res = '';
            
            if (num >= 11 && num <= 19) {
                res = units[num % 10] + 'і';
            } else {
                const t = Math.floor(num / 10) * 10;
                const u = num % 10;
                if (t > 0) res += tens[t];
                if (u > 0) res += units[u];
            }

            // Титло: ставится над второй буквой с конца или над единственной
            if (res.length > 1) {
                return res.slice(0, -1) + '\u0483' + res.slice(-1);
            } else {
                return res + '\u0483';
            }
        }

        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Europe/Moscow', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const parts = new Intl.DateTimeFormat('ru-RU', options).formatToParts(now);
            
            const h = parseInt(parts.find(p => p.type === 'hour').value);
            const m = parseInt(parts.find(p => p.type === 'minute').value);
            const s = parseInt(parts.find(p => p.type === 'second').value);

            const sep = '<span class="sep">:</span>';
            document.getElementById('clock').innerHTML = 
                `${toSlavonic(h)} ${sep} ${toSlavonic(m)} ${sep} ${toSlavonic(s)}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
